<div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-6 md:p-10 mb-8">
      <div class="space-y-8">

            <!-- Area, Bedrooms, Bathrooms -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">
                              Area (sqm) <span class="text-red-500">*</span>
                        </label>
                        <input type="number" class="w-full px-5 py-3.5 rounded-2xl border border-gray-300
                 focus:outline-none focus:ring-2 focus:ring-black focus:border-black
                 transition-all duration-200" value="" />
                  </div>
                  <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Number of Bedrooms</label>
                        <select class="w-full px-5 py-3.5 rounded-2xl border border-gray-300
                 focus:outline-none focus:ring-2 focus:ring-black focus:border-black
                 transition-all duration-200">
                              <option value="0">0</option>
                              <option value="1">1</option>
                              <option value="2">2</option>
                              <option value="3">3</option>
                              <option value="4">4</option>
                              <option value="5">5</option>
                              <option value="6">6</option>
                        </select>
                  </div>
                  <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Number of Bathrooms</label>
                        <select class="w-full px-5 py-3.5 rounded-2xl border border-gray-300
                 focus:outline-none focus:ring-2 focus:ring-black focus:border-black
                 transition-all duration-200">
                              <option value="1">1</option>
                              <option value="2">2</option>
                              <option value="3">3</option>
                              <option value="4">4</option>
                              <option value="5">5</option>
                        </select>
                  </div>
            </div>

            <!-- Floor & Furnished -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-2">Floor</label>
                        <input type="number" class="w-full px-5 py-3.5 rounded-2xl border border-gray-300
                 focus:outline-none focus:ring-2 focus:ring-black focus:border-black
                 transition-all duration-200" value="" />
                  </div>
                  <div>
                        <label class="block text-sm font-semibold text-gray-800 mb-3">Furnished</label>
                        <div class="flex gap-3">
                              <button type="button" class="flex-1 rounded-2xl px-4 py-3 font-semibold
                   border-2 border-black bg-black text-white
                   hover:bg-gray-900 transition-all">
                                    Yes
                              </button>
                              <button type="button" class="flex-1 rounded-2xl px-4 py-3 font-semibold
                   border-2 border-gray-200 text-gray-600
                   hover:border-black hover:text-black transition-all">
                                    No
                              </button>
                        </div>
                  </div>
            </div>

            <!-- Amenities and Services -->
            <div>
                  <label class="block text-sm font-semibold text-gray-800 mb-3">Amenities & Services</label>
                  <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-parking text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Parking</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-elevator text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Elevator</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-shield-alt text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Security</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-dumbbell text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Gym</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-water text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Pool</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-tree text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Garden</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-square text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Balcony</span>
                        </button>

                        <button type="button" class="group rounded-2xl border-2 border-gray-200 p-4
                 hover:border-black hover:shadow-md transition-all
                 flex flex-col items-center gap-2">
                              <i class="fa-solid fa-fan text-2xl text-gray-500 group-hover:text-black"></i>
                              <span class="text-sm font-medium text-gray-700">Air Conditioning</span>
                        </button>
                  </div>
            </div>

      </div>
</div>
