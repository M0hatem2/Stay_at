<div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-6">
  <div class="space-y-6">
    <!-- Upload Images -->
    <div>
      <label class="block text-gray-800 font-semibold mb-3">Upload Images</label>
      <label class="block cursor-pointer">
        <input type="file" multiple accept="image/*" class="hidden">
        <div class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center hover:border-black hover:bg-black/5 transition-all">
          <i class="fa-solid fa-cloud-arrow-up text-gray-400 text-6xl mb-3"></i>
          <p class="text-gray-700 mb-1 font-medium">Drag and drop images here or click to select</p>
          <p class="text-gray-500 text-sm">Max: 10 images, Max size: 5MB per image</p>
        </div>
      </label>
    </div>
  </div>
</div>
