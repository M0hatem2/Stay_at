<div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 mb-6">
  <div class="space-y-6">
    <!-- City & Area -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-gray-800 font-semibold mb-2">
          City <span class="text-red-500">*</span>
        </label>
        <select class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C4A962] transition-all">
          <option value="">Select the city</option>
          <option value="cairo">Cairo</option>
          <option value="giza">Giza</option>
          <option value="alexandria">Alexandria</option>
        </select>
      </div>
      <div>
        <label class="block text-gray-800 font-semibold mb-2">
          Area <span class="text-red-500">*</span>
        </label>
        <input type="text" placeholder="Select the area"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C4A962] transition-all" value="">
      </div>
    </div>

    <!-- Street & Building Number -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-gray-800 font-semibold mb-2">Street</label>
        <input type="text" placeholder="Street Name"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C4A962] transition-all" value="">
      </div>
      <div>
        <label class="block text-gray-800 font-semibold mb-2">Building Number</label>
        <input type="text"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C4A962] transition-all" value="">
      </div>
    </div>

    <!-- Map -->
    <div>
      <label class="block text-gray-800 font-semibold mb-2">Mark the property location on the map</label>
      <div class="w-full h-64 bg-gray-100 rounded-xl border border-gray-300 flex items-center justify-center hover:shadow-md transition-all relative">
        <div class="text-center text-gray-500">
          <i class="fa-solid fa-map-pin text-4xl mb-2"></i>
          <p>Map Component (LeafletJS)</p>
          <p class="text-sm text-gray-400">Lat: 30.0444, Lng: 31.2357</p>
        </div>
      </div>
    </div>
  </div>
</div>
