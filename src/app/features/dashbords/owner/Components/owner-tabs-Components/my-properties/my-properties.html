<div class="bg-white rounded-2xl p-6 shadow-sm max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-gray-900 text-xl font-semibold mb-1">
        My Properties
      </h2>
      <p class="text-gray-600 text-sm">
        You have 2 published properties
      </p>
    </div>

    <button
      class="px-4 py-2 gradient-primary-btn text-white rounded-lg hover:bg-[#B39952] transition flex items-center gap-2 text-sm">
      <i class="fa-solid fa-plus"></i>
      Add Property
    </button>
  </div>

  <!-- Property Card -->
  <div class="space-y-5">

    <!-- Property 1 -->
    <div class="border border-gray-200 rounded-xl overflow-hidden hover:border-[#C4A962] transition">
      <div class="md:flex">

        <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400&h=300&fit=crop"
          class="w-full md:w-64 h-48 object-cover" alt="Luxury Furnished Apartment" />

        <div class="flex-1 p-5">

          <!-- Top Info -->
          <div class="flex items-start justify-between mb-4">
            <div>
              <div class="flex items-center gap-2 mb-2">
                <h3 class="text-gray-900 font-medium">
                  Luxury Furnished Apartment – Fifth Settlement
                </h3>
                <span class="px-2 py-1 rounded-full text-xs bg-green-100 text-green-700">
                  Active
                </span>
              </div>

              <div class="flex items-center gap-2 text-gray-600 text-sm mb-2">
                <i class="fa-solid fa-location-dot"></i>
                <span>New Cairo, Egypt</span>
              </div>

              <div class="flex items-center gap-5 text-gray-600 text-sm">
                <div class="flex items-center gap-1">
                  <i class="fa-solid fa-bed"></i>
                  <span>3</span>
                </div>
                <div class="flex items-center gap-1">
                  <i class="fa-solid fa-bath"></i>
                  <span>2</span>
                </div>
                <div class="flex items-center gap-1">
                  <i class="fa-solid fa-expand"></i>
                  <span>180 m²</span>
                </div>
              </div>
            </div>

            <div class="text-right">
              <div class="text-[#C4A962] text-xl font-semibold mb-1">
                EGP 12,000
              </div>
              <div class="text-gray-500 text-sm">
                For Rent
              </div>
            </div>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-4 gap-4 mb-4 pb-4 border-b border-gray-100 text-sm">
            <div>
              <div class="flex items-center gap-1 text-gray-500 text-xs mb-1">
                <i class="fa-solid fa-eye"></i>
                Views
              </div>
              <div class="font-semibold">245</div>
            </div>
            <div>
              <div class="flex items-center gap-1 text-gray-500 text-xs mb-1">
                <i class="fa-solid fa-heart"></i>
                Favorites
              </div>
              <div class="font-semibold">18</div>
            </div>
            <div>
              <div class="flex items-center gap-1 text-gray-500 text-xs mb-1">
                <i class="fa-solid fa-message"></i>
                Requests
              </div>
              <div class="font-semibold">12</div>
            </div>
            <div>
              <div class="flex items-center gap-1 text-gray-500 text-xs mb-1">
                <i class="fa-solid fa-dollar-sign"></i>
                Revenue
              </div>
              <div class="font-semibold">36,000</div>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex flex-wrap gap-2">
            <button
              class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm flex items-center gap-2">
              <i class="fa-solid fa-pen"></i>
              Edit
            </button>

            <button
              class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm flex items-center gap-2">
              <i class="fa-solid fa-share-nodes"></i>
              Share
            </button>

            <button
              class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-sm flex items-center gap-2">
              <i class="fa-solid fa-chart-column"></i>
              Analytics
            </button>

            <button
              class="px-4 py-2 border border-red-300 text-red-600 rounded-lg hover:bg-red-50 transition text-sm flex items-center gap-2">
              <i class="fa-solid fa-trash"></i>
              Delete
            </button>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
