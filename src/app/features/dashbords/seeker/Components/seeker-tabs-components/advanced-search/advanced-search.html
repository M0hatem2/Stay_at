<div class="bg-white rounded-2xl p-8 shadow-md border border-gray-100">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
            <div>
                  <h2 class="text-gray-900 text-xl font-semibold mb-1">
                        Quick Search
                  </h2>
                  <p class="text-gray-500 text-sm">
                        Find the perfect property for you
                  </p>
            </div>

            <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-blue-100 text-blue-600">
                  <i class="fa-solid fa-magnifying-glass text-xl"></i>
            </div>
      </div>

      <!-- Form -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

            <!-- Property Type -->
            <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                        Property Type
                  </label>
                  <select
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        <option>Rent</option>
                        <option>Buy</option>
                  </select>
            </div>

            <!-- Location -->
            <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                        Location
                  </label>
                  <div class="relative">
                        <i class="fa-solid fa-location-dot absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" placeholder="Select location"
                              class="w-full pr-10 pl-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                  </div>
            </div>

            <!-- Max Price -->
            <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                        Max Price
                  </label>
                  <div class="relative">
                        <i class="fa-solid fa-dollar-sign absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="number" placeholder="20,000"
                              class="w-full pr-10 pl-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                  </div>
            </div>

            <!-- Bedrooms -->
            <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">
                        Bedrooms
                  </label>
                  <select
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                        <option>Any</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4+</option>
                  </select>
            </div>

      </div>

      <!-- Button -->
      <button
            class="w-full mt-6 px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all duration-200 flex items-center justify-center gap-2 font-medium">
            <i class="fa-solid fa-magnifying-glass"></i>
            Search Now
      </button>

</div>

<div class="bg-white rounded-2xl p-6 shadow-lg mt-10">
      <h3 class="text-gray-900 text-lg font-semibold mb-6">Saved Searches</h3>
      <div class="space-y-4">

            <!-- Item -->
            <div
                  class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl hover:bg-blue-50 transition-colors cursor-pointer shadow-sm hover:shadow-md">
                  <div>
                        <div class="text-gray-900 font-medium mb-1">Furnished Apartment in Fifth Settlement</div>
                        <div class="text-sm text-gray-500">42 new results</div>
                  </div>
                  <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">1 hour ago</span>
                        <button
                              class="text-blue-600 hover:text-blue-700 p-2 rounded-full hover:bg-blue-100 transition-colors">
                              <i class="fa-solid fa-arrow-right"></i>
                        </button>
                  </div>
            </div>

            <!-- Item -->
            <div
                  class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl hover:bg-blue-50 transition-colors cursor-pointer shadow-sm hover:shadow-md">
                  <div>
                        <div class="text-gray-900 font-medium mb-1">Sheikh Zayed Villa</div>
                        <div class="text-sm text-gray-500">18 new results</div>
                  </div>
                  <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">3 hours ago</span>
                        <button
                              class="text-blue-600 hover:text-blue-700 p-2 rounded-full hover:bg-blue-100 transition-colors">
                              <i class="fa-solid fa-arrow-right"></i>
                        </button>
                  </div>
            </div>

            <!-- Item -->
            <div
                  class="flex items-center  justify-between p-4 bg-gray-50 rounded-2xl hover:bg-blue-50 transition-colors cursor-pointer shadow-sm hover:shadow-md">
                  <div>
                        <div class="text-gray-900 font-medium mb-1">North Coast Chalet</div>
                        <div class="text-sm text-gray-500">15 new results</div>
                  </div>
                  <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-400">1 day ago</span>
                        <button
                              class="text-blue-600 hover:text-blue-700 p-2 rounded-full hover:bg-blue-100 transition-colors">
                              <i class="fa-solid fa-arrow-right"></i>
                        </button>
                  </div>
            </div>

      </div>
</div>
