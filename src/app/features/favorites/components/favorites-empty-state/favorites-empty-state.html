<div class="bg-white rounded-2xl shadow-sm p-16 text-center">
  <div
    class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6 hover:bg-gray-200 transition-colors"
  >
    <i class="fas fa-heart text-gray-400 text-4xl"></i>
  </div>

  <h3 class="text-2xl font-bold text-gray-900 mb-3">No Favorites Yet</h3>

  <p class="text-gray-600 mb-8 max-w-md mx-auto leading-relaxed">
    Start adding properties and projects to your favorites for easy access later. Build your
    personalized collection of dream properties!
  </p>

  <button
    (click)="onBrowseProperties()"
    class="inline-flex items-center gap-3 px-8 py-3 bg-gradient-to-r from-[#C4A962] to-[#D4B972] text-white rounded-xl hover:shadow-lg hover:scale-105 transition-all duration-300 font-medium"
  >
    <i class="fas fa-search text-lg"></i>
    <span>Browse Properties</span>
    <i class="fas fa-arrow-right text-sm"></i>
  </button>

  <!-- Additional helpful links -->
  <div class="mt-8 pt-8 border-t border-gray-200">
    <p class="text-sm text-gray-500 mb-4">You can also explore:</p>
    <div class="flex flex-wrap justify-center gap-4">
      <button
        class="inline-flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:text-[#C4A962] transition-colors"
      >
        <i class="fas fa-map-marker-alt"></i>
        <span>Popular Areas</span>
      </button>
      <button
        class="inline-flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:text-[#C4A962] transition-colors"
      >
        <i class="fas fa-star"></i>
        <span>Featured Properties</span>
      </button>
      <button
        class="inline-flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:text-[#C4A962] transition-colors"
      >
        <i class="fas fa-fire"></i>
        <span>Hot Deals</span>
      </button>
    </div>
  </div>
</div>
