<div
  class="bg-gradient-to-br from-black via-gray-900 to-black text-white py-16 relative overflow-hidden"
>
  <div class="absolute inset-0 opacity-10">
    <div class="absolute top-20 left-20 w-72 h-72 bg-[#C4A962] rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-[#C4A962] rounded-full blur-3xl"></div>
  </div>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="text-center">
      <div
        class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-sm px-6 py-3 rounded-full mb-6"
      >
        <i class="fas fa-heart text-[#C4A962] text-lg"></i>
        <span class="text-sm">{{ totalFavorites }} Favorite Properties</span>
      </div>
      <h1 class="text-4xl md:text-5xl mb-4 font-bold">My Favorites</h1>
      <p class="text-lg text-gray-300 max-w-2xl mx-auto">
        All your favorite properties and projects in one place
      </p>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-12">
      <!-- Total Favorites -->
      <div
        class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20 hover:bg-white/15 transition-all"
      >
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-[#C4A962]/20 rounded-xl flex items-center justify-center">
            <i class="fas fa-heart text-[#C4A962] text-xl"></i>
          </div>
          <div>
            <div class="text-3xl font-bold">{{ totalFavorites }}</div>
            <div class="text-sm text-gray-300">Total Favorites</div>
          </div>
        </div>
      </div>

      <!-- Property Units -->
      <div
        class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20 hover:bg-white/15 transition-all"
      >
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
            <i class="fas fa-bed text-blue-400 text-xl"></i>
          </div>
          <div>
            <div class="text-3xl font-bold">{{ totalUnits }}</div>
            <div class="text-sm text-gray-300">Property Units</div>
          </div>
        </div>
      </div>

      <!-- Projects -->
      <div
        class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 border border-white/20 hover:bg-white/15 transition-all"
      >
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
            <i class="fas fa-chart-line text-green-400 text-xl"></i>
          </div>
          <div>
            <div class="text-3xl font-bold">{{ totalProjects }}</div>
            <div class="text-sm text-gray-300">Projects</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
