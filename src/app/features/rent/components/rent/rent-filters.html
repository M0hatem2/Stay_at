<!-- Filters Section -->
<div class="space-y-6">
  <!-- Price Filter -->
  <div>
    <label class="block text-gray-700 mb-2">Price (EGP)</label>
    <div class="grid grid-cols-2 gap-3">
      <input
        type="number"
        placeholder="From"
        [(ngModel)]="filterForm.priceFrom"
        class="px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C4A962]"
      />
      <input
        type="number"
        placeholder="To"
        [(ngModel)]="filterForm.priceTo"
        class="px-4 py-2 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#C4A962]"
      />
    </div>
  </div>

  <!-- Rental Type Filter -->
  <div>
    <label class="block text-gray-700 mb-2">Rental Type</label>
    <div class="space-y-2">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onRentPeriodChange('day', $event.target.checked)"
          [checked]="filterForm.rentPeriod.includes('day')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Daily</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onRentPeriodChange('week', $event.target.checked)"
          [checked]="filterForm.rentPeriod.includes('week')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Weekly</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onRentPeriodChange('month', $event.target.checked)"
          [checked]="filterForm.rentPeriod.includes('month')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Monthly</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onRentPeriodChange('year', $event.target.checked)"
          [checked]="filterForm.rentPeriod.includes('year')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Yearly</span>
      </label>
    </div>
  </div>

  <!-- Unit Type Filter -->
  <div>
    <label class="block text-gray-700 mb-2">Unit Type</label>
    <div class="space-y-2">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onUnitTypeChange('apartment', $event.target.checked)"
          [checked]="filterForm.unitType.includes('apartment')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Apartment</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onUnitTypeChange('studio', $event.target.checked)"
          [checked]="filterForm.unitType.includes('studio')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Studio</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onUnitTypeChange('villa', $event.target.checked)"
          [checked]="filterForm.unitType.includes('villa')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Villa</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="checkbox"
          (change)="onUnitTypeChange('chalet', $event.target.checked)"
          [checked]="filterForm.unitType.includes('chalet')"
          class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
        />
        <span class="text-sm text-gray-700">Chalet</span>
      </label>
    </div>
  </div>

  <!-- Number of Bedrooms -->
  <div>
    <label class="block text-gray-700 mb-2">Number of Bedrooms</label>
    <div class="grid grid-cols-4 gap-2">
      <button
        (click)="onBedroomsChange(1)"
        [class]="
          filterForm.bedrooms === 1
            ? 'px-3 py-2 border-2 border-[#C4A962] gradient-primary-btn text-white rounded-lg text-sm transition-colors'
            : 'px-3 py-2 border border-gray-300 rounded-lg text-sm hover:border-[#C4A962] hover:gradient-primary-btn hover:text-white transition-colors'
        "
      >
        1
      </button>
      <button
        (click)="onBedroomsChange(2)"
        [class]="
          filterForm.bedrooms === 2
            ? 'px-3 py-2 border-2 border-[#C4A962] gradient-primary-btn text-white rounded-lg text-sm transition-colors'
            : 'px-3 py-2 border border-gray-300 rounded-lg text-sm hover:border-[#C4A962] hover:gradient-primary-btn hover:text-white transition-colors'
        "
      >
        2
      </button>
      <button
        (click)="onBedroomsChange(3)"
        [class]="
          filterForm.bedrooms === 3
            ? 'px-3 py-2 border-2 border-[#C4A962] gradient-primary-btn text-white rounded-lg text-sm transition-colors'
            : 'px-3 py-2 border border-gray-300 rounded-lg text-sm hover:border-[#C4A962] hover:gradient-primary-btn hover:text-white transition-colors'
        "
      >
        3
      </button>
      <button
        (click)="onBedroomsChange(4)"
        [class]="
          filterForm.bedrooms === 4
            ? 'px-3 py-2 border-2 border-[#C4A962] gradient-primary-btn text-white rounded-lg text-sm transition-colors'
            : 'px-3 py-2 border border-gray-300 rounded-lg text-sm hover:border-[#C4A962] hover:gradient-primary-btn hover:text-white transition-colors'
        "
      >
        4+
      </button>
    </div>
  </div>

  <!-- Additional Filters -->
  <div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input
        type="checkbox"
        [(ngModel)]="filterForm.furnished"
        class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
      />
      <span class="text-sm text-gray-700">Furnished Only</span>
    </label>
  </div>

  <div>
    <label class="flex items-center gap-2 cursor-pointer">
      <input
        type="checkbox"
        [(ngModel)]="filterForm.isVerified"
        class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
      />
      <span class="text-sm text-gray-700">Verified Units Only</span>
    </label>
  </div>

  <!-- Apply Filters Button -->
  <button
    (click)="onApplyFilters()"
    class="w-full px-6 py-3 gradient-primary-btn text-white rounded-xl hover:bg-[#B39952] transition-colors"
  >
    Apply Filters
  </button>
</div>
