<div class="relative" data-aos="fade-up" [attr.data-aos-delay]="step.id * 150">
  <!-- Connector Line -->
  <div *ngIf="showConnector"
       class="hidden lg:block absolute top-16 left-full w-32 h-1 bg-gradient-to-r from-gray-300 to-transparent -ml-4">
  </div>

  <!-- Card -->
  <div
       class="relative bg-white rounded-2xl p-6 shadow-sm hover:shadow-xl transition-shadow duration-300 border border-gray-100">

    <!-- Step Number Badge -->
    <div
         class="absolute -top-6 -left-6 w-12 h-12 rounded-full bg-gradient-to-br {{ step.gradientFrom }} {{ step.gradientTo }} flex items-center justify-center shadow-lg">
      <span class="text-white font-bold">{{ step.id.toString().padStart(2, '0') }}</span>
    </div>

    <!-- Icon Container -->
    <div class="{{ step.bgColor }} w-16 h-16 rounded-2xl flex items-center justify-center mb-6 mt-4">
      <div
           class="bg-gradient-to-br {{ step.gradientFrom }} {{ step.gradientTo }} w-10 h-10 rounded-xl flex items-center justify-center transform transition-transform duration-300 hover:scale-110">
        <i class="{{ step.icon }} w-6 h-6 text-white"></i>
      </div>
    </div>

    <!-- Content -->
    <h3 class="text-gray-900 mb-2 text-lg font-semibold">{{ step.title }}</h3>
    <p class="text-gray-600 text-sm leading-relaxed">{{ step.description }}</p>
  </div>
</div>
