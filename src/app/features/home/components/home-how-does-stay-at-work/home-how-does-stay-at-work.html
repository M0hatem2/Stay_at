<div class="bg-white">
      <section class="py-20 bg-gradient-to-b from-gray-50 to-white">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

                  <!-- Header Section -->
                  <div class="text-center mb-16" data-aos="fade-up">
                        <h2 class="text-xl font-bold text-gray-900 mb-4">How Does Stay At Work?</h2>
                        <p class="text-gray-600 max-w-2xl mx-auto text-lg">Your journey to the perfect property in 4
                              simple steps</p>
                  </div>

                  <!-- Steps Grid -->
                  <div class="flex flex-wrap justify-center gap-8">
                        <app-step-card *ngFor="let step of steps; let i = index" [step]="step"
                              [showConnector]="i < steps.length - 1" data-aos="fade-up" [attr.data-aos-delay]="i * 150"
                              class="flex-1 min-w-[220px] max-w-[250px]">
                        </app-step-card>
                  </div>

                  <!-- Call to Action -->
                  <div class="text-center mt-12" data-aos="fade-up" data-aos-delay="600">
                        <button (click)="onStartJourney()"
                              class="inline-flex items-center gap-2 px-6 py-3 gradient-primary-btn text-white rounded-xl shadow-lg hover:shadow-xl transition-shadow cursor-pointer text-lg font-medium">
                              <span>Start Your Journey Now</span>
                              <span class="text-xl">→</span>
                        </button>
                  </div>

            </div>
      </section>
</div>

<!-- AOS JS Initialization (if مش موجود) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
