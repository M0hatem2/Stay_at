<main>
      <div
            class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-100 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">

            <!-- Background Blurs -->
            <div class="absolute inset-0 overflow-hidden pointer-events-none">
                  <div class="absolute -top-40 -right-40 w-80 h-80 gradient-primary-btn/10 rounded-full blur-3xl"></div>
                  <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-500/10 rounded-full blur-3xl"></div>
            </div>

            <!-- Card Container -->
            <div class="max-w-md w-full space-y-8 relative z-10">

                  <!-- Logo & Welcome -->
                  <div class="text-center">
                        <div class="flex justify-center mb-6">
                              <div
                                    class="w-20 h-20 bg-gradient-to-br from-black to-gray-800 rounded-2xl flex items-center justify-center shadow-2xl">
                                    <span class="text-[#C4A962] text-3xl font-bold">SA</span>
                              </div>
                        </div>
                        <h2 class="text-3xl text-gray-900 mb-2 font-semibold">Welcome Back!</h2>
                        <p class="text-gray-600">Sign in to access your account</p>

                        <!-- Info Box -->
                  </div>

                  <!-- Sign In Form -->
                  <div class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
                        <form [formGroup]="signInForm" (ngSubmit)="onSubmit()" class="space-y-5">

                              <!-- Error Message -->
                              <div *ngIf="errorMessage"
                                    class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl">
                                    {{ errorMessage }}
                              </div>

                              <!-- Email -->
                              <div>
                                    <label for="email" class="block text-sm text-gray-700 mb-2">Email Address</label>
                                    <div class="relative">
                                          <input id="email" formControlName="email" type="email" autocomplete="email"
                                                class="text-black block w-full pl-4 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#C4A962] focus:border-transparent transition-all"
                                                placeholder="Enter your email">
                                          <div
                                                class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                                <i class="fas fa-envelope text-gray-400"></i>
                                          </div>
                                    </div>
                              </div>

                              <!-- Password -->
                              <div>
                                    <label for="password" class="block text-sm text-gray-700 mb-2">Password</label>
                                    <div class="relative">
                                          <input id="password" formControlName="password" type="password"
                                                autocomplete="current-password"
                                                class=" text-black  block w-full pl-12 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#C4A962] focus:border-transparent transition-all"
                                                placeholder="Enter your password">
                                          <div class="absolute inset-y-0 left-0 pl-3 flex items-center">
                                                <i
                                                      class="fas fa-eye text-gray-400 hover:text-gray-600 cursor-pointer"></i>
                                          </div>
                                          <div
                                                class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                                <i class="fas fa-lock text-gray-400"></i>
                                          </div>
                                    </div>
                              </div>

                              <!-- Remember & Forgot -->
                              <div class="flex items-center justify-between">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                          <input type="checkbox" class="h-4 w-4 text-[#C4A962] border-gray-300 rounded">
                                          <span class="text-sm text-gray-700">Remember me</span>
                                    </label>
                                    <button type="button"
                                          class="text-sm text-[#C4A962] hover:text-[#B39952] transition-colors">Forgot
                                          password?</button>
                              </div>

                              <!-- Submit -->
                              <button type="submit" [disabled]="isLoading"
                                    class="w-full flex items-center justify-center gap-2 px-6 py-3 gradient-primary-btn text-white rounded-xl hover:from-[#B39952] hover:to-[#A38942] transition-all shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed">
                                    <span *ngIf="!isLoading">Sign In</span>
                                    <span *ngIf="isLoading">Signing In...</span>
                                    <i class="fas fa-arrow-right w-5 h-5" *ngIf="!isLoading"></i>
                                    <i class="fas fa-spinner fa-spin w-5 h-5" *ngIf="isLoading"></i>
                              </button>
                        </form>

                        <!-- Divider -->
                        <div class="relative my-4">
                              <div class="absolute inset-0 flex items-center">
                                    <div class="w-full border-t border-gray-300"></div>
                              </div>
                              <div class="relative flex justify-center text-sm">
                                    <span class="px-4 bg-white text-gray-500">OR</span>
                              </div>
                        </div>

                        <!-- Create Account -->
                        <button type="button"
                              class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-white border-2 border-gray-300 text-gray-700 rounded-xl hover:border-[#C4A962] hover:bg-gray-50 transition-all">
                              <i class="fas fa-user"></i>
                              <span>Create New Account</span>
                        </button>
                  </div>

                  <!-- Back to Home -->
                  <div class="text-center mt-4">
                        <button
                              class="text-sm text-gray-600 hover:text-[#C4A962] transition-colors inline-flex items-center gap-2">
                              <i class="fas fa-arrow-left rotate-180"></i>
                              <span>Back to Home</span>
                        </button>
                  </div>

                  <!-- Quick Access by Account Type -->
                  <div class="bg-white rounded-2xl shadow-lg p-6">
                        <h3 class="text-sm text-gray-700 mb-4 text-center">Quick Access by Account Type:</h3>
                        <div class="grid grid-cols-2 gap-3">

                              <!-- Seeker -->
                              <div
                                    class="flex flex-col items-center gap-2 p-3 border border-gray-200 rounded-xl hover:border-[#C4A962] hover:bg-gray-50 transition-all cursor-pointer">
                                    <div
                                          class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-lg flex items-center justify-center">
                                          <i class="fas fa-user text-white"></i>
                                    </div>
                                    <span class="text-xs text-gray-700">Seeker</span>
                              </div>

                              <!-- Owner -->
                              <div
                                    class="flex flex-col items-center gap-2 p-3 border border-gray-200 rounded-xl hover:border-[#C4A962] hover:bg-gray-50 transition-all cursor-pointer">
                                    <div
                                          class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-lg flex items-center justify-center">
                                          <i class="fas fa-home text-white"></i>
                                    </div>
                                    <span class="text-xs text-gray-700">Owner</span>
                              </div>

                              <!-- Broker -->
                              <div
                                    class="flex flex-col items-center gap-2 p-3 border border-gray-200 rounded-xl hover:border-[#C4A962] hover:bg-gray-50 transition-all cursor-pointer">
                                    <div
                                          class="w-10 h-10 bg-gradient-to-br from-purple-500 to-purple-600 rounded-lg flex items-center justify-center">
                                          <i class="fas fa-briefcase text-white"></i>
                                    </div>
                                    <span class="text-xs text-gray-700">Broker</span>
                              </div>

                              <!-- Developer -->
                              <div
                                    class="flex flex-col items-center gap-2 p-3 border border-gray-200 rounded-xl hover:border-[#C4A962] hover:bg-gray-50 transition-all cursor-pointer">
                                    <div
                                          class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-lg flex items-center justify-center">
                                          <i class="fas fa-building text-white"></i>
                                    </div>
                                    <span class="text-xs text-gray-700">Developer</span>
                              </div>
                        </div>
                  </div>
            </div>
      </div>
</main>
