<div class="forgot-password-container">
      <div class="forgot-password-card">
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your email address and we'll send you a link to reset your password</p>

            <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="forgot-form">
                  <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" formControlName="email" class="form-control"
                              placeholder="Enter your email address" />
                        <div *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
                              class="error-message">
                              <span *ngIf="forgotForm.get('email')?.errors?.['required']">Email is required.</span>
                              <span *ngIf="forgotForm.get('email')?.errors?.['email']">Please enter a valid email
                                    address.</span>
                        </div>
                  </div>

                  <div *ngIf="errorMessage" class="alert alert-error">
                        {{ errorMessage }}
                  </div>

                  <div *ngIf="successMessage" class="alert alert-success">
                        {{ successMessage }}
                  </div>

                  <button type="submit" class="btn btn-primary" [disabled]="forgotForm.invalid || isLoading">
                        <span *ngIf="isLoading" class="spinner"></span>
                        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
                  </button>
            </form>

            <div class="links">
                  <a routerLink="/auth/sign-in" (click)="goToSignIn()">Back to Sign In</a>
            </div>
      </div>
</div>
