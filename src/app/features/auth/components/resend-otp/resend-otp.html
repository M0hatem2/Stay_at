<div class="resend-otp-container">
      <div class="resend-otp-card">
            <h2>Resend OTP</h2>
            <p class="subtitle">Enter your email to receive a new OTP</p>

            <form [formGroup]="resendForm" (ngSubmit)="onSubmit()" class="resend-form">
                  <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" formControlName="email" class="form-control"
                              placeholder="Enter your email address" />
                        <div *ngIf="resendForm.get('email')?.invalid && resendForm.get('email')?.touched"
                              class="error-message">
                              <span *ngIf="resendForm.get('email')?.errors?.['required']">Email is required.</span>
                              <span *ngIf="resendForm.get('email')?.errors?.['email']">Please enter a valid email
                                    address.</span>
                        </div>
                  </div>

                  <div *ngIf="errorMessage" class="alert alert-error">
                        {{ errorMessage }}
                  </div>

                  <div *ngIf="successMessage" class="alert alert-success">
                        {{ successMessage }}
                  </div>

                  <button type="submit" class="btn btn-primary" [disabled]="resendForm.invalid || isLoading">
                        <span *ngIf="isLoading" class="spinner"></span>
                        {{ isLoading ? 'Sending...' : 'Resend OTP' }}
                  </button>
            </form>

            <div class="links">
                  <a routerLink="/auth/sign-in">Back to Sign In</a>
            </div>
      </div>
</div>
