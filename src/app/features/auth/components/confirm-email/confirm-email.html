<div class="confirm-email-container">
      <div class="confirm-email-card">
            <h2>Email Confirmation</h2>
            <p class="subtitle">Please enter the OTP sent to your email to confirm your account</p>

            <form [formGroup]="confirmForm" (ngSubmit)="onSubmit()" class="confirm-form">
                  <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" formControlName="email" class="form-control"
                              placeholder="Enter your email address" />
                        <div *ngIf="confirmForm.get('email')?.invalid && confirmForm.get('email')?.touched"
                              class="error-message">
                              <span *ngIf="confirmForm.get('email')?.errors?.['required']">Email is required.</span>
                              <span *ngIf="confirmForm.get('email')?.errors?.['email']">Please enter a valid email
                                    address.</span>
                        </div>
                  </div>

                  <div class="form-group">
                        <label for="otp">OTP Code</label>
                        <input type="text" id="otp" formControlName="otp" class="form-control"
                              placeholder="Enter 6-digit OTP" maxlength="6" inputmode="numeric" />
                        <div *ngIf="confirmForm.get('otp')?.invalid && confirmForm.get('otp')?.touched"
                              class="error-message">
                              <span *ngIf="confirmForm.get('otp')?.errors?.['required']">OTP is required.</span>
                              <span
                                    *ngIf="confirmForm.get('otp')?.errors?.['minlength'] || confirmForm.get('otp')?.errors?.['maxlength']">OTP
                                    must be exactly 6 digits.</span>
                        </div>
                  </div>

                  <div *ngIf="errorMessage" class="alert alert-error">
                        {{ errorMessage }}
                  </div>

                  <div *ngIf="successMessage" class="alert alert-success">
                        {{ successMessage }}
                  </div>

                  <button type="submit" class="btn btn-primary" [disabled]="confirmForm.invalid || isLoading">
                        <span *ngIf="isLoading" class="spinner"></span>
                        {{ isLoading ? 'Confirming...' : 'Confirm Email' }}
                  </button>
            </form>

            <div class="actions">
                  <button class="btn btn-secondary" (click)="resendOTP()" [disabled]="isLoading">
                        Resend OTP
                  </button>
                  <a routerLink="/auth/sign-in" class="btn btn-link">Back to Sign In</a>
            </div>
      </div>
</div>
