<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div *ngIf="isLoading" class="flex justify-center items-center py-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#C4A962]"></div>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
    <p class="text-red-600">{{ errorMessage }}</p>
    <button
      (click)="retrySearch()"
      class="mt-4 px-6 py-2 bg-red-500 text-white rounded-xl hover:bg-red-600 transition-colors"
    >
      Retry
    </button>
  </div>

  <div *ngIf="!isLoading && !errorMessage && projects.length === 0" class="bg-gray-50 border border-gray-200 rounded-xl p-12 text-center">
    <i class="fas fa-building text-gray-400 text-5xl mb-4"></i>
    <h3 class="text-gray-700 text-xl mb-2">No Projects Found</h3>
    <p class="text-gray-500">Try another search keyword or clear search to show all projects.</p>
  </div>

  <div *ngIf="!isLoading && !errorMessage && projects.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <app-projects-card
      *ngFor="let project of projects"
      [project]="project"
      (projectClick)="onProjectClick($event)"
    ></app-projects-card>
  </div>
</div>
