<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  @if (errorMessage) {
    <div
      class="mb-4 rounded-xl border border-amber-300 bg-amber-50 text-amber-800 text-sm px-4 py-3"
    >
      <i class="fas fa-circle-info mr-2"></i>
      {{ errorMessage }}
    </div>
  }

  @if (isLoading) {
    <div
      class="mb-4 rounded-xl border border-blue-200 bg-blue-50 text-blue-700 text-sm px-4 py-3"
    >
      <i class="fas fa-spinner fa-spin mr-2"></i>
      Loading account information...
    </div>
  }

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <div class="lg:col-span-2 space-y-6">
      <app-account-profile-card [profile]="profile" [stats]="stats"></app-account-profile-card>

      <app-account-achievements-section [items]="achievements"></app-account-achievements-section>

      <app-account-gallery-section [categories]="galleryCategories"></app-account-gallery-section>

      <app-account-reviews-section [reviews]="reviews"></app-account-reviews-section>
    </div>

    <div class="lg:col-span-1">
      <div class="sticky top-24 space-y-6">
        <app-account-contact-card
          [responseTime]="responseTime"
          [phoneNumber]="contactPhoneNumber"
          [email]="contactEmail"
        ></app-account-contact-card>

        <app-account-trust-safety-card [checks]="trustChecks"></app-account-trust-safety-card>

        <button
          class="w-full text-center text-sm text-gray-500 hover:text-red-600 transition-colors"
          type="button"
        >
          <i class="fas fa-triangle-exclamation mr-1"></i>
          Report this owner
        </button>
      </div>
    </div>
  </div>
</div>
