<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Loading State -->
  @if (isLoading) {
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div
          class="animate-spin rounded-full h-16 w-16 border-b-2 border-[#C4A962] mx-auto mb-4"
        ></div>
        <p class="text-gray-600">جاري تحميل تفاصيل الوحدة...</p>
      </div>
    </div>
  }

  <!-- Error State -->
  @if (!isLoading && errorMessage) {
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="text-red-500 text-6xl mb-4">⚠️</div>
        <p class="text-gray-800 text-xl mb-2">{{ errorMessage }}</p>
        <button
          (click)="router.navigate(['/buy'])"
          class="mt-4 px-6 py-3 gradient-primary-btn text-white rounded-xl hover:bg-[#B39952] transition-colors"
        >
          العودة إلى صفحة البحث
        </button>
      </div>
    </div>
  }

  <!-- Content -->
  @if (!isLoading && !errorMessage) {
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">
        <app-unit-gallery
          [images]="galleryImages"
          [title]="displayTitle"
          [currentIndex]="currentImageIndex"
          (imageClick)="openImageModal()"
          (indexChange)="currentImageIndex = $event"
        >
        </app-unit-gallery>
        <app-property-details [propertyData]="propertyData"></app-property-details>
        <app-description [description]="propertyData.description"></app-description>
        <app-features [features]="propertyData.features"></app-features>
        <app-compound-features
          [compoundFeatures]="propertyData.compound_features"
          [compoundName]="propertyData.specs.compound"
        >
        </app-compound-features>
        <app-payment-plans [selectedPlan]="propertyData.selected_plan_summary"></app-payment-plans>
        <app-investment-analysis></app-investment-analysis>
        <app-documents-taxes></app-documents-taxes>
        <app-nearby-places></app-nearby-places>
        <app-similar-properties></app-similar-properties>
      </div>
      <div class="lg:col-span-1">
        <app-sidebar [propertyData]="propertyData" [agentInitial]="agentInitial"></app-sidebar>
      </div>
    </div>
  }
</div>

<app-image-modal
  [isOpen]="isImageModalOpen"
  [galleryImages]="galleryImages"
  [selectedImageIndex]="selectedImageIndex"
  (close)="closeImageModal()"
  (previousImage)="previousImage()"
  (nextImage)="nextImage()"
>
</app-image-modal>
