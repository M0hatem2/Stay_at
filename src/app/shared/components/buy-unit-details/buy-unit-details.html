<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Loading State -->
  @if (isLoading) {
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div
          class="animate-spin rounded-full h-16 w-16 border-b-2 border-[#C4A962] mx-auto mb-4"
        ></div>
        <p class="text-gray-600">جاري تحميل تفاصيل الوحدة...</p>
      </div>
    </div>
  }

  <!-- Error State -->
  @if (!isLoading && errorMessage) {
    <div class="flex items-center justify-center min-h-[70vh] px-4">
      <div class="w-full max-w-xl rounded-3xl border border-red-100 bg-white p-8 text-center shadow-xl">
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-red-100 text-red-600">
          <span class="text-3xl font-bold">!</span>
        </div>
        <h2 class="text-2xl font-semibold text-gray-900">Something went wrong</h2>
        <p class="mt-2 text-sm text-gray-600">We couldn't load this unit details page.</p>
        <p class="mt-4 rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage }}</p>
        <button
          (click)="router.navigate(['/buy'])"
          class="mt-6 mx-auto px-6 py-3 gradient-primary-btn text-white rounded-xl hover:bg-[#B39952] transition-colors"
        >
          Back to Search
        </button>
      </div>
    </div>
  }

  <!-- Content -->
  @if (!isLoading && !errorMessage) {
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">
        <app-unit-gallery
          [images]="galleryImages"
          [title]="displayTitle"
          [currentIndex]="currentImageIndex"
          (imageClick)="openImageModal()"
          (indexChange)="currentImageIndex = $event"
        >
        </app-unit-gallery>
        <app-property-details [propertyData]="propertyData"></app-property-details>
        <app-description [description]="propertyData.description"></app-description>
        <app-features [features]="propertyData.features"></app-features>
        <app-compound-features
          [compoundFeatures]="propertyData.compound_features"
          [compoundName]="propertyData.specs.compound"
        >
        </app-compound-features>
        <app-payment-plans
          [plans]="propertyData.payment_plans"
          [selectedPlan]="propertyData.selected_plan_summary"
          (planSelected)="onPaymentPlanSelected($event)"
        ></app-payment-plans>
        <app-investment-analysis
          [analysis]="propertyData.price_investment_analysis"
          [summary]="analysisSummary"
          [lastUpdated]="analysisLastUpdated"
        ></app-investment-analysis>
        <app-documents-taxes
          [documents]="propertyData.documents"
          [taxesAndFees]="propertyData.taxes_and_fees"
        ></app-documents-taxes>
        <app-nearby-places [places]="propertyData.nearby_places"></app-nearby-places>
        <app-similar-properties
          [similarProperties]="propertyData.similar_properties"
        ></app-similar-properties>
      </div>
      <div class="lg:col-span-1">
        <app-sidebar
          [propertyData]="propertyData"
          [agentInitial]="agentInitial"
          [ownerContact]="ownerContact"
          [selectedPlanSummary]="propertyData.selected_plan_summary"
          (changePlanRequested)="scrollToPaymentPlans()"
        ></app-sidebar>
      </div>
    </div>
  }
</div>

<app-image-modal
  [isOpen]="isImageModalOpen"
  [galleryImages]="galleryImages"
  [selectedImageIndex]="selectedImageIndex"
  (close)="closeImageModal()"
  (previousImage)="previousImage()"
  (nextImage)="nextImage()"
>
</app-image-modal>
