<div class="bg-white rounded-2xl p-6 max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl animate-fade-in">
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-[#de5806] to-[#470e03] rounded-full flex items-center justify-center">
                <i class="fa-solid fa-dollar-sign text-white text-lg"></i>
            </div>
            <h3 class="text-xl font-semibold text-gray-900">Make an Offer</h3>
        </div>
        <button 
            class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full p-2 transition-colors"
            (click)="onClose()">
            <i class="fa-solid fa-times w-5 h-5"></i>
        </button>
    </div>
    <form class="space-y-6" (ngSubmit)="onSubmit()" #offerForm="ngForm">
        <div class="space-y-4">
            <div>
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-3">
                    <i class="fa-solid fa-user text-[#de5806]"></i>
                    Full Name
                </label>
                <input 
                    type="text"
                    name="name"
                    [(ngModel)]="formData.name"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#de5806] focus:ring-2 focus:ring-[#de5806]/20 outline-none transition-colors"
                    placeholder="Enter your full name"
                    required>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-3">
                        <i class="fa-solid fa-phone text-[#de5806]"></i>
                        Phone Number
                    </label>
                    <input 
                        type="tel"
                        name="phone"
                        [(ngModel)]="formData.phone"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#de5806] focus:ring-2 focus:ring-[#de5806]/20 outline-none transition-colors"
                        placeholder="+20 1XX XXX XXXX"
                        required>
                </div>
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-3">
                        <i class="fa-solid fa-envelope text-[#de5806]"></i>
                        Email Address
                    </label>
                    <input 
                        type="email"
                        name="email"
                        [(ngModel)]="formData.email"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#de5806] focus:ring-2 focus:ring-[#de5806]/20 outline-none transition-colors"
                        placeholder="your.email@domain.com"
                        required>
                </div>
            </div>
            
            <div>
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-3">
                    <i class="fa-solid fa-money-bill text-[#de5806]"></i>
                    Offer Price (EGP)
                </label>
                <input 
                    type="number"
                    name="offerPrice"
                    [(ngModel)]="formData.offerPrice"
                    placeholder="3,500,000"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#de5806] focus:ring-2 focus:ring-[#de5806]/20 outline-none transition-colors"
                    required>
            </div>
            
            <div>
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-3">
                    <i class="fa-solid fa-credit-card text-[#de5806]"></i>
                    Payment Method
                </label>
                <select 
                    name="paymentMethod"
                    [(ngModel)]="formData.paymentMethod"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#de5806] focus:ring-2 focus:ring-[#de5806]/20 outline-none transition-colors">
                    <option value="cash">Cash Payment</option>
                    <option value="installment">Installment Plan</option>
                    <option value="mortgage">Bank Mortgage</option>
                </select>
            </div>
            
            <div>
                <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-3">
                    <i class="fa-solid fa-comment text-[#de5806]"></i>
                    Additional Notes (Optional)
                </label>
                <textarea 
                    name="notes"
                    [(ngModel)]="formData.notes"
                    rows="4"
                    class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-[#de5806] focus:ring-2 focus:ring-[#de5806]/20 outline-none resize-none transition-colors"
                    placeholder="Any additional information or special conditions..."></textarea>
            </div>
        </div>
        
        <div class="flex gap-3 pt-4 border-t border-gray-100">
            <button 
                type="button"
                (click)="onClose()"
                class="flex-1 px-6 py-3 border-2 border-gray-300 text-gray-700 rounded-xl hover:bg-gray-50 hover:border-gray-400 transition-all font-medium">
                Cancel
            </button>
            <button 
                type="submit"
                [disabled]="!offerForm.valid"
                class="flex-1 px-6 py-3 bg-gradient-to-r from-[#de5806] to-[#470e03] text-white rounded-xl hover:shadow-xl hover:scale-[1.02] transition-all font-semibold disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <i class="fa-solid fa-paper-plane"></i>
                Submit Offer
            </button>
        </div>
    </form>
</div>
