@if (value) {
<div class="bg-white rounded-2xl p-6 shadow-sm hover:shadow-xl transition-all duration-300">
  <div [ngClass]="[value.gradientClass, 'w-14 h-14 rounded-2xl flex items-center justify-center mb-4 shadow-md']">
    <i [class]="value.icon" class="text-white text-2xl"></i>
  </div>
  <h3 class="text-xl font-semibold text-gray-900 mb-2">{{ value.title }}</h3>
  <p class="text-gray-600 text-sm leading-relaxed">{{ value.description }}</p>
</div>
}
