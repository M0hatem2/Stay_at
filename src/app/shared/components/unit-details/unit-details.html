<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-8">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 sm:gap-8">
    <div class="lg:col-span-2 space-y-4 sm:space-y-6">
      <!-- Gallery Component -->
      <app-unit-gallery
        [images]="galleryImages"
        [title]="displayTitle"
        [currentIndex]="currentImageIndex"
        (imageClick)="openImageModal()"
        (indexChange)="currentImageIndex = $event"
      />

      <!-- Unit Info Component -->
      <app-unit-info
        [title]="displayTitle || 'Luxury Furnished Apartment - Fifth Settlement'"
        [location]="displayLocation || 'Fifth Settlement, New Cairo'"
        [bedrooms]="bedrooms || 3"
        [bathrooms]="bathrooms || 2"
        [area]="area || '180 sqm'"
        [rating]="rating || 4.8"
        [reviews]="reviews || 24"
        [floor]="floor || 5"
        [furnished]="furnished !== null ? furnished : true"
        [yearBuilt]="yearBuilt"
        [description]="
          descriptionText ||
          'Luxury apartment in a prime location with all amenities and services. Super luxury finishing, wonderful view, close to all services and transportation. The apartment is fully furnished with modern furniture and appliances.'
        "
        [amenities]="
          amenities.length
            ? amenities
            : [
                'Central AC',
                'Fully Equipped Kitchen',
                'Swimming Pool',
                'Gym',
                '24/7 Security',
                'Parking',
                'Private Garden',
                'Spacious Balcony',
              ]
        "
      />
      <!-- Pricing Table Component -->
      <app-pricing-table
        [finalPricing]="unitData?.finalPricing"
        [currency]="pricingCurrency"
        (priceSelected)="onPriceSelected($event)"
      />

      <app-availability-calendar (dateClicked)="onDateClick($event)"></app-availability-calendar>

      <!-- Day Details Modal Component -->
      <app-day-details-modal
        [show]="showDayDetails"
        [selectedDay]="selectedDay"
        (close)="closeDayDetails()"
        (bookDate)="openBookingPopup()"
      />

      <!-- AI Analysis Component -->
      <app-ai-analysis [aiAnalysis]="unitData?.aiAnalysis" />

      <!-- Location Map Component -->
      <app-location-map
        [nearbyLandmarks]="unitData?.aiAnalysis?.nearbyLandmarks"
        [coordinates]="locationCoordinates"
        [locationAddress]="locationAddress"
        [locationArea]="locationArea"
        [locationCity]="locationCity"
        [locationCountry]="locationCountry"
        [latitude]="locationLat || 30.0444"
        [longitude]="locationLng || 31.2357"
        [propertyName]="displayTitle"
        [propertyImage]="heroImage"
      />
    </div>
    <div class="lg:col-span-1">
      <!-- Booking Sidebar Component -->
      <app-booking-sidebar
        [priceDisplay]="priceDisplay || '12 EGP'"
        [pricePeriod]="pricePeriodLabel || 'Monthly'"
        [cancellationPolicy]="
          freeCancellationHours
            ? 'Free cancellation within ' + freeCancellationHours + ' hours'
            : 'Free cancellation within 24 hours'
        "
        [owner]="ownerInfo"
        [safetyTips]="safetyTips.length ? safetyTips : defaultSafetyTips"
        (bookNow)="openBookingPopup()"
      />
    </div>
  </div>

  <!-- Image Modal Component -->
  <app-image-modal
    [show]="showImageModal"
    [images]="galleryImages"
    [currentIndex]="currentImageIndex"
    (close)="closeImageModal()"
    (indexChange)="currentImageIndex = $event"
  />
</div>
