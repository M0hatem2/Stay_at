<div class="bg-white rounded-3xl p-8 w-full max-w-2xl my-8 shadow-xl relative max-h-[90vh] overflow-y-auto">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 flex items-center justify-center rounded-full gradient-primary-btn/20">
        <i class="fa-solid fa-calendar-check text-[#C4A962]"></i>
      </div>
      <h2 class="text-gray-900 text-xl font-bold">Book the Apartment</h2>
    </div>

    <button
      (click)="onClose()"
      class="p-2 bg-gray-100 rounded-full hover:bg-red-100 transition-colors"
    >
      <i class="fa-solid fa-xmark text-gray-600"></i>
    </button>
  </div>

  <!-- Form -->
  <form class="space-y-5" (submit)="onSubmit($event)">
    <!-- Name & Phone -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-gray-500 text-sm mb-1 block">Your Name</label>
        <div class="relative">
          <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input
            type="text"
            [(ngModel)]="name"
            name="name"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>

      <div>
        <label class="text-gray-500 text-sm mb-1 block">Phone Number</label>
        <div class="relative">
          <i class="fa-solid fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input
            type="tel"
            [(ngModel)]="mobileNumber"
            name="mobileNumber"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>
    </div>

    <!-- Email & Guests -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-gray-500 text-sm mb-1 block">Email Address</label>
        <div class="relative">
          <i
            class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>

      <div>
        <label class="text-gray-500 text-sm mb-1 block">Number of Guests</label>
        <div class="relative">
          <i class="fa-solid fa-users absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <select
            [(ngModel)]="numberOfGuests"
            name="numberOfGuests"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
          >
            @for (guest of guestOptions; track guest) {
              <option [value]="guest">{{ guest }}</option>
            }
          </select>
        </div>
      </div>
    </div>

    <!-- Dates -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-gray-500 text-sm mb-1 block">Check-in Date</label>
        <div class="relative">
          <i
            class="fa-solid fa-calendar-day absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="date"
            [(ngModel)]="checkInDate"
            name="checkInDate"
            [disabled]="isDateDisabled"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962] disabled:bg-gray-100 disabled:cursor-not-allowed"
            required
          />
        </div>
      </div>

      <div>
        <label class="text-gray-500 text-sm mb-1 block">Check-out Date</label>
        <div class="relative">
          <i
            class="fa-solid fa-calendar-xmark absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="date"
            [(ngModel)]="checkOutDate"
            name="checkOutDate"
            [disabled]="isDateDisabled"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962] disabled:bg-gray-100 disabled:cursor-not-allowed"
            required
          />
        </div>
      </div>
    </div>

    @if (isDateDisabled) {
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-3 flex items-center gap-2">
        <i class="fa-solid fa-info-circle text-blue-600"></i>
        <p class="text-sm text-blue-700">Dates are pre-selected from the calendar</p>
      </div>
    }

    <!-- Rental & Payment -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-gray-500 text-sm mb-1 block">Rental Duration</label>
        <div class="relative">
          <i class="fa-solid fa-clock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <select
            [(ngModel)]="rentalType"
            name="rentalType"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
          >
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="yearly">Yearly</option>
          </select>
        </div>
      </div>

      <div>
        <label class="text-gray-500 text-sm mb-1 block">Payment Method</label>
        <div class="relative">
          <i
            class="fa-solid fa-credit-card absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <select
            [(ngModel)]="paymentMethod"
            name="paymentMethod"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
          >
            <option value="card">Card</option>
            <option value="wallet">Wallet</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Currency & Location -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-gray-500 text-sm mb-1 block">Currency</label>
        <div class="relative">
          <i
            class="fa-solid fa-money-bill-wave absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            [(ngModel)]="currency"
            name="currency"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>

      <div>
        <label class="text-gray-500 text-sm mb-1 block">City</label>
        <div class="relative">
          <i
            class="fa-solid fa-city absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            [(ngModel)]="city"
            name="city"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-gray-500 text-sm mb-1 block">State</label>
        <div class="relative">
          <i
            class="fa-solid fa-map absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            [(ngModel)]="state"
            name="state"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>

      <div>
        <label class="text-gray-500 text-sm mb-1 block">Country</label>
        <div class="relative">
          <i
            class="fa-solid fa-earth-africa absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
          ></i>
          <input
            type="text"
            [(ngModel)]="country"
            name="country"
            class="w-full pl-10 p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
            required
          />
        </div>
      </div>
    </div>

    <!-- Message -->
    <div>
      <label class="text-gray-500 text-sm mb-1 block">Additional Message</label>
      <textarea
        [(ngModel)]="message"
        name="message"
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-[#C4A962]"
        rows="4"
        placeholder="Any special requests..."
      ></textarea>
    </div>

    @if (submitError) {
      <div class="bg-red-50 border border-red-200 rounded-xl p-3 flex items-center gap-2">
        <i class="fa-solid fa-circle-exclamation text-red-600"></i>
        <p class="text-sm text-red-700">{{ submitError }}</p>
      </div>
    }

    @if (submitSuccess) {
      <div class="bg-green-50 border border-green-200 rounded-xl p-3 flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-green-600"></i>
        <p class="text-sm text-green-700">{{ submitSuccess }}</p>
      </div>
    }

    <!-- Submit -->
    <button
      type="submit"
      [disabled]="isSubmitting"
      class="w-full py-3 bg-black text-white rounded-2xl hover:gradient-primary-btn hover:text-black transition-all font-semibold flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
    >
      <i class="fa-solid" [class.fa-spinner]="isSubmitting" [class.fa-spin]="isSubmitting" [class.fa-check]="!isSubmitting"></i>
      <span>{{ isSubmitting ? (paymentMethod === 'card' ? 'Redirecting to payment...' : 'Processing booking...') : 'Confirm Booking' }}</span>
    </button>
  </form>
</div>
